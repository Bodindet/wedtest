<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<script>
async function logoutAll(){
  const token = localStorage.getItem('token');
  await fetch('/api/user/logout-all',{method:'POST',headers:{'Authorization':'Bearer '+token}});
  alert('Logged out all devices');
}
async function loadStatus(){
  const token = localStorage.getItem('token');
  const res=await fetch('/api/user/2fa/status',{headers:{'Authorization':'Bearer '+token}});
  const data=await res.json();
  document.getElementById('status').textContent=data.enabled?('Enabled ('+data.method+')'):'Disabled';
}
async function setup(method){
  const token=localStorage.getItem('token');
  const res=await fetch('/api/user/2fa/setup',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({method})});
  const data=await res.json();
  if(data.secret) alert('Your TOTP secret: '+data.secret);
  if(data.message) alert(data.message);
}
async function verify(){
  const token=localStorage.getItem('token');
  const code=document.getElementById('code').value;
  const res=await fetch('/api/user/2fa/verify',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({code})});
  const data=await res.json();
  alert(data.status||data.error);
  loadStatus();
}
async function disable2fa(){
  const token=localStorage.getItem('token');
  await fetch('/api/user/2fa/disable',{method:'POST',headers:{'Authorization':'Bearer '+token}});
  loadStatus();
}
window.onload=loadStatus;
</script>
</head>
<body>
<h1>Profile</h1>
<p>2FA status: <span id="status"></span></p>
<button onclick="setup('totp')">Setup TOTP</button>
<button onclick="setup('email')">Send Email OTP</button>
<input id="code" placeholder="Code"><button onclick="verify()">Verify Code</button>
<button onclick="disable2fa()">Disable 2FA</button>
<hr>
<button onclick="logoutAll()">Logout All Devices</button>
</body>
</html>
