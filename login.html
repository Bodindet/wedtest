<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<script>
async function login(event){
  event.preventDefault();
  const username=document.getElementById('username').value;
  const password=document.getElementById('password').value;
  const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data=await res.json();
  if(res.ok){
    localStorage.setItem('token',data.token);
    if(data.twoFA){
      document.getElementById('twofa').style.display='block';
    }else{
      window.location.href='dashboard.html';
    }
  }else{
    alert(data.error||'Login failed');
  }
}

async function verify2fa(){
  const token=localStorage.getItem('token');
  const code=document.getElementById('code').value;
  const res=await fetch('/api/user/2fa/verify',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({code})});
  const data=await res.json();
  if(res.ok){
    window.location.href='dashboard.html';
  }else{
    alert(data.error||'2FA failed');
  }
}
</script>
</head>
<body>
<h1>Login</h1>
<form onsubmit="login(event)">
<input id="username" placeholder="Username" required>
<input id="password" type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<p><a href="register.html">Register</a></p>
<div id="twofa" style="display:none;">
  <h3>Enter 2FA Code</h3>
  <input id="code" placeholder="Code">
  <button onclick="verify2fa()">Verify</button>
</div>
</body>
</html>
